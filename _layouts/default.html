<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" id="hljs-dark"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" id="hljs-light"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
  <script>
    (function () {
      var t = localStorage.getItem('psp-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      if (t === 'light') {
        document.getElementById('hljs-dark').disabled = true;
        document.getElementById('hljs-light').disabled = false;
      }
    })();
  </script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0c0f14;
      --bg-card: #141820;
      --bg-code: #1a1f2e;
      --border: #1e2636;
      --border-h: #2a3a5c;
      --text: #e2e8f0;
      --muted: #7a8ba8;
      --accent: #3b82f6;
      --accent-2: #06b6d4;
      --green: #22c55e;
      --font-mono: 'JetBrains Mono', monospace;
      --font-body: 'Source Sans 3', sans-serif;
      --glow: rgba(59, 130, 246, 0.07);
      --copy-bg: rgba(255, 255, 255, 0.06);
      --copy-h: rgba(255, 255, 255, 0.12);
    }

    [data-theme="light"] {
      --bg: #f4f6fa;
      --bg-card: #ffffff;
      --bg-code: #f0f2f6;
      --border: #dfe4ed;
      --border-h: #b8c4d9;
      --text: #1a2030;
      --muted: #5a6a84;
      --accent: #2563eb;
      --accent-2: #0891b2;
      --green: #16a34a;
      --glow: rgba(37, 99, 235, 0.05);
      --copy-bg: rgba(0, 0, 0, 0.04);
      --copy-h: rgba(0, 0, 0, 0.08);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      top: -120px;
      left: -100px;
      border-radius: 50%;
      background: var(--glow);
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    /* Nav */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      transition: background 0.3s, border-color 0.3s;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-back {
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .nav-back:hover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
    }

    .nav-title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.05rem;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    .theme-btn:hover {
      border-color: var(--border-h);
      color: var(--accent);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Typography */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 12px;
    }

    p {
      margin-bottom: 16px;
    }

    strong {
      color: var(--text);
    }

    blockquote {
      border-left: 3px solid var(--accent);
      background: var(--bg-card);
      margin: 16px 0;
      padding: 14px 20px;
      border-radius: 0 10px 10px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    blockquote p {
      margin-bottom: 4px;
    }

    blockquote p:last-child {
      margin-bottom: 0;
    }

    /* Inline code */
    code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--bg-code);
      padding: 2px 7px;
      border-radius: 5px;
      border: 1px solid var(--border);
      font-variant-ligatures: none;
      font-feature-settings: "liga" 0, "calt" 0;
    }

    /* Code blocks */
    .code-block {
      position: relative;
      margin: 16px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .code-block-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 14px 4px;
      background: var(--bg-code);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .copy-btn {
      padding: 3px 10px;
      background: var(--copy-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .copy-btn:hover {
      background: var(--copy-h);
      color: var(--accent);
      border-color: var(--accent);
    }

    .copy-btn.copied {
      color: var(--green);
      border-color: var(--green);
    }

    .code-block pre {
      margin: 0;
      padding: 18px 20px;
      background: var(--bg-code);
      border: none;
      border-radius: 0;
      overflow-x: auto;
    }

    .code-block pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.65;
      font-variant-ligatures: none;
      font-feature-settings: "liga" 0, "calt" 0;
    }

    /* Fallback for any pre not wrapped by JS */
    pre {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      margin: 16px 0;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85rem;
      line-height: 1.65;
      font-variant-ligatures: none;
      font-feature-settings: "liga" 0, "calt" 0;
    }

    /* Visual memory diagrams */
    .pointer-diagram {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(130px, 0.7fr) minmax(150px, 1fr);
      align-items: center;
      gap: 14px;
      margin: 18px 0;
      padding: 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .memory-cell {
      text-align: center;
    }

    .memory-address {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .memory-box {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-code);
      border: 1px solid var(--border-h);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .memory-name {
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .pointer-arrow {
      position: relative;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }

    .pointer-arrow::before {
      content: '';
      position: absolute;
      top: 24px;
      left: 18px;
      right: 8px;
      border-top: 2px solid var(--accent);
    }

    .pointer-arrow::after {
      content: '';
      position: absolute;
      top: 18px;
      left: 8px;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 10px solid var(--accent);
    }

    .pointer-arrow span {
      position: relative;
      z-index: 1;
      margin-top: 28px;
      padding: 2px 6px;
      background: var(--bg-card);
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.92rem;
    }

    th,
    td {
      padding: 10px 14px;
      text-align: left;
      border: 1px solid var(--border);
    }

    th {
      background: var(--bg-card);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--muted);
    }

    td {
      background: var(--bg);
    }

    /* Lists */
    ul,
    ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    li {
      margin-bottom: 6px;
    }

    /* Collapsible panels */
    details {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 16px 0;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    details[open] {
      border-color: var(--accent);
    }

    details summary {
      padding: 14px 20px;
      cursor: pointer;
      list-style: none;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--accent);
      user-select: none;
      transition: background 0.2s;
    }

    details summary::-webkit-details-marker {
      display: none;
    }

    details summary::before {
      content: '▸ ';
      font-family: var(--font-mono);
    }

    details[open] summary::before {
      content: '▾ ';
    }

    details summary:hover {
      background: rgba(59, 130, 246, 0.06);
    }

    details>*:not(summary):not(pre):not(blockquote):not(.code-block):not(.highlighter-rouge):not(.highlight):not(ol):not(ul) {
      padding: 0 20px;
    }

    details>ol,
    details>ul {
      padding: 6px 20px 6px 44px;
    }

    details>.code-block {
      margin: 8px 16px 12px;
    }

    details>blockquote {
      margin: 8px 16px;
    }

    details>p:last-child,
    details>.code-block:last-child,
    details>blockquote:last-child {
      margin-bottom: 16px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .content {
        padding: 24px 16px 60px;
      }

      h1 {
        font-size: 1.6rem;
      }

      h2 {
        font-size: 1.2rem;
      }

      .code-block pre {
        padding: 14px;
      }

      .nav-title {
        display: none;
      }

      .pointer-diagram {
        grid-template-columns: 1fr;
      }

      .pointer-arrow {
        min-height: 50px;
      }

      .pointer-arrow::before {
        top: 6px;
        bottom: 6px;
        left: 50%;
        right: auto;
        border-top: 0;
        border-left: 2px solid var(--accent);
      }

      .pointer-arrow::after {
        top: 4px;
        left: calc(50% - 6px);
      }

      .pointer-arrow span {
        margin-top: 0;
        margin-left: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-left">
      <a href="{{ '/' | relative_url }}" class="nav-back">← Home</a>
      <span class="nav-title">Problem Solving &amp; Programming</span>
    </div>
    <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
      <span id="themeIcon">☀️</span>
    </button>
  </div>

  <main class="content">
    {{ content }}
  </main>

  <div class="footer">
    Built with care for students &copy; 2026
  </div>

  <script>
    (function () {
      var PLAIN = { plaintext: true, text: true, '': true };

      function getLang(container) {
        var m = container.className.match(/language-(\w+)/);
        return m ? m[1].toLowerCase() : '';
      }

      function wrapBlock(container) {
        if (container.closest('.code-block')) return;

        var pre = container.querySelector('pre');
        var code = pre && pre.querySelector('code');
        if (!pre || !code) return;

        var lang = getLang(container);
        var isCode = lang && !PLAIN[lang];
        var label = isCode ? lang.toUpperCase() : 'OUTPUT';

        var wrapper = document.createElement('div');
        wrapper.className = 'code-block';

        var bar = document.createElement('div');
        bar.className = 'code-block-bar';

        var langSpan = document.createElement('span');
        langSpan.textContent = label;

        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'COPY';
        btn.addEventListener('click', function () {
          var text = code.innerText || code.textContent;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function () { flash(btn); });
          } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            flash(btn);
          }
        });

        bar.appendChild(langSpan);
        bar.appendChild(btn);
        container.parentNode.insertBefore(wrapper, container);
        wrapper.appendChild(bar);
        wrapper.appendChild(container);

        if (isCode && !code.classList.contains('language-' + lang)) {
          code.classList.add('language-' + lang);
        }
      }

      function flash(btn) {
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(function () {
          btn.textContent = 'COPY';
          btn.classList.remove('copied');
        }, 1800);
      }

      function enhance(root) {
        (root || document).querySelectorAll('div.highlighter-rouge:not(.code-block-done)').forEach(function (el) {
          wrapBlock(el);
          el.classList.add('code-block-done');
        });
      }

      function highlight(root) {
        (root || document).querySelectorAll('pre code[class*="language-"]:not(.hljs)').forEach(function (block) {
          hljs.highlightElement(block);
        });
      }

      enhance(document);
      hljs.configure({ languages: [] });
      highlight(document);

      document.querySelectorAll('details').forEach(function (el) {
        el.addEventListener('toggle', function () {
          if (el.open) { enhance(el); highlight(el); }
        });
      });

      var btn = document.getElementById('themeToggle');
      var icon = document.getElementById('themeIcon');
      var root = document.documentElement;
      var dark = document.getElementById('hljs-dark');
      var light = document.getElementById('hljs-light');

      function setTheme(t) {
        root.setAttribute('data-theme', t);
        localStorage.setItem('psp-theme', t);
        icon.textContent = t === 'light' ? '🌙' : '☀️';
        dark.disabled = t === 'light';
        light.disabled = t === 'dark';
      }

      setTheme(localStorage.getItem('psp-theme') || 'dark');

      btn.addEventListener('click', function () {
        setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>

</body>

</html>
